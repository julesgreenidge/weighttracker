<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weight Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>Chart.register(Chart.Filler);</script>
<style>
  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.08);
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --accent: #3c34b8;
    --accent-light: #eeedfe;
    --teal: #1d9e75;
    --teal-light: #e1f5ee;
    --amber: #ba7517;
    --amber-light: #faeeda;
    --danger: #e24b4a;
    --danger-light: #fcebeb;
    --success: #639922;
  }
  [data-theme="dark"] {
    --bg: #1a1a1a;
    --surface: #242424;
    --border: rgba(255,255,255,0.1);
    --text: #f0f0f0;
    --text-muted: #999;
    --accent: #8f89e8;
    --accent-light: #26215c;
    --teal: #5dcaa5;
    --teal-light: #04342c;
    --amber: #ef9f27;
    --amber-light: #412402;
    --danger: #f09595;
    --danger-light: #501313;
    --success: #97c459;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow-x: hidden; max-width: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; }
  header { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 0 1rem; display: flex; align-items: center; justify-content: space-between; height: 52px; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 16px; font-weight: 500; letter-spacing: -0.3px; }
  .header-actions { display: flex; gap: 8px; }
  button { cursor: pointer; font-family: inherit; font-size: 14px; border: 0.5px solid var(--border); background: transparent; color: var(--text); border-radius: 8px; padding: 6px 12px; transition: background 0.15s; }
  button:hover { background: var(--accent-light); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { opacity: 0.9; background: var(--accent); }
  .btn-danger { color: var(--danger); border-color: var(--danger); }
  .btn-danger:hover { background: var(--danger-light); }
  main { max-width: 900px; margin: 0 auto; padding: 1rem; }
  .setup-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
  .setup-card h2 { font-size: 15px; font-weight: 500; margin-bottom: 1rem; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  @media (max-width: 600px) { .field-row { grid-template-columns: 1fr; } }
  .field { display: flex; flex-direction: column; gap: 4px; }
  label { font-size: 12px; color: var(--text-muted); }
  input, select { font-family: inherit; font-size: 14px; background: var(--bg); border: 0.5px solid var(--border); border-radius: 8px; padding: 8px 10px; color: var(--text); width: 100%; }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  .setup-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .status { font-size: 13px; color: var(--text-muted); margin-top: 8px; min-height: 20px; }
  .status.error { color: var(--danger); }
  .status.ok { color: var(--success); }
  .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
  .metric-rows { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; border-top: 0.5px solid var(--border); padding-top: 10px; }
  .metric-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
  .metric-row-label { color: var(--text-muted); font-size: 12px; }
  .metric-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 1rem; }
  .metric-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .metric-value { font-size: 26px; font-weight: 500; letter-spacing: -1px; }
  .metric-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .metric-sub.up { color: var(--danger); }
  .metric-sub.down { color: var(--success); }
  .chart-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .chart-card h3 { font-size: 14px; font-weight: 500; margin-bottom: 1rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-size: 11px; }
  .chart-wrap { position: relative; width: 100%; }
  .bmi-bands { position: relative; border-radius: 8px; overflow: hidden; }
  .section-title { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin: 1.5rem 0 0.75rem; }
  .data-table-wrap { overflow-x: auto; overflow-y: auto; max-height: 400px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 12px; border-bottom: 0.5px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 1; white-space: nowrap; }
  td { padding: 8px 12px; border-bottom: 0.5px solid var(--border); white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 500; }
  .tag-normal { background: var(--teal-light); color: var(--teal); }
  .tag-overweight { background: var(--amber-light); color: var(--amber); }
  .tag-obese { background: var(--danger-light); color: var(--danger); }
  .tag-under { background: var(--accent-light); color: var(--accent); }
  .bmi-cell { display: inline-block; padding: 2px 8px; border-radius: 6px; font-weight: 500; color: #fff; font-size: 13px; }
  .bmi-normal { background: var(--teal); }
  .bmi-overweight { background: var(--amber); }
  .bmi-obese { background: var(--danger); }
  .bmi-under { background: var(--accent); }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 16px; padding: 1.5rem; width: 90%; max-width: 380px; }
  .modal h2 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
  .modal .field { margin-bottom: 12px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 1rem; justify-content: flex-end; }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
  .empty h2 { font-size: 16px; font-weight: 500; margin-bottom: 0.5rem; color: var(--text); }
  .loading { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 14px; }
  .target-line-label { font-size: 11px; fill: #ba7517; }
  .two-col-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  @media (max-width: 600px) { .two-col-grid { grid-template-columns: 1fr; } }
  .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 10px; font-size: 12px; color: var(--text-muted); }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
  .delta-pos { color: var(--danger); }
  .delta-neg { color: var(--success); }
</style>
</head>
<body>

<header>
  <h1>Weight tracker</h1>
  <div class="header-actions">
    <button id="btn-theme" aria-label="Toggle dark mode"><svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
    <button id="btn-add" aria-label="Add reading"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
    <button id="btn-settings" aria-label="Settings"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
  </div>
</header>

<main id="main">
  <div class="empty" id="empty-state">
    <h2>Welcome to your weight tracker</h2>
    <p>Connect your Google Sheet or add readings manually to get started.</p>
    <div style="margin-top:1rem; display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">
      <button class="btn-primary" id="btn-setup-sheet">Connect Google Sheet</button>
      <button id="btn-add-first">Add reading manually</button>
    </div>
  </div>
  <div id="dashboard" style="display:none"></div>
</main>

<!-- Settings modal -->
<div class="modal-overlay" id="modal-settings">
  <div class="modal">
    <h2>Settings</h2>
    <div class="field">
      <label>Google Sheets — Spreadsheet ID</label>
      <input type="text" id="set-sheet-id" placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms">
    </div>
    <div class="field">
      <label>API key</label>
      <input type="password" id="set-api-key" placeholder="AIzaSy...">
    </div>
    <div class="field">
      <label>Sheet / tab name</label>
      <input type="text" id="set-sheet-name" placeholder="Sheet1">
    </div>
    <div class="field">
      <label>Date column (letter)</label>
      <input type="text" id="set-col-date" placeholder="B" style="width:80px">
    </div>
    <div class="field">
      <label>Weight column (letter)</label>
      <input type="text" id="set-col-weight" placeholder="C" style="width:80px">
    </div>
    <div class="field">
      <label>Target weight (kg)</label>
      <input type="number" id="set-target" placeholder="75" step="0.1">
    </div>
    <div class="status" id="settings-status"></div>
    <div class="modal-actions">
      <button id="btn-settings-cancel">Cancel</button>
      <button class="btn-primary" id="btn-settings-load">Save &amp; load data</button>
    </div>
  </div>
</div>

<!-- Add reading modal -->
<div class="modal-overlay" id="modal-add">
  <div class="modal">
    <h2>Add reading</h2>
    <div class="field">
      <label>Date</label>
      <input type="date" id="add-date">
    </div>
    <div class="field">
      <label>Weight (kg)</label>
      <input type="number" id="add-weight" placeholder="84.5" step="0.01">
    </div>
    <div class="modal-actions">
      <button id="btn-add-cancel">Cancel</button>
      <button class="btn-primary" id="btn-add-save">Save</button>
    </div>
  </div>
</div>

<script>
const HEIGHT_M = 1.778;
const BMI_NORMAL = parseFloat((25 * HEIGHT_M * HEIGHT_M).toFixed(2));
const BMI_OVERWEIGHT = parseFloat((30 * HEIGHT_M * HEIGHT_M).toFixed(2));
let allData = [];
let target = null;
let charts = {};

const $ = id => document.getElementById(id);

function saveLocal() {
  localStorage.setItem('wt_data', JSON.stringify(allData));
  localStorage.setItem('wt_settings', JSON.stringify({
    sheetId: $('set-sheet-id').value,
    apiKey: $('set-api-key').value,
    sheetName: $('set-sheet-name').value,
    colDate: $('set-col-date').value,
    colWeight: $('set-col-weight').value,
    target: $('set-target').value
  }));
}

function loadSettings() {
  const s = JSON.parse(localStorage.getItem('wt_settings') || '{}');
  if (s.sheetId) $('set-sheet-id').value = s.sheetId;
  if (s.apiKey) $('set-api-key').value = s.apiKey;
  if (s.sheetName) $('set-sheet-name').value = s.sheetName;
  if (s.colDate) $('set-col-date').value = s.colDate;
  if (s.colWeight) $('set-col-weight').value = s.colWeight;
  if (s.target) { $('set-target').value = s.target; target = parseFloat(s.target); }
}

function parseDate(str) {
  if (!str) return null;
  str = str.trim();
  const dd_mm = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if (dd_mm) {
    let y = parseInt(dd_mm[3]);
    if (y < 100) y += 2000;
    return new Date(y, parseInt(dd_mm[2])-1, parseInt(dd_mm[1]));
  }
  const d = new Date(str);
  return isNaN(d) ? null : d;
}

function toISO(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function bmi(w) {
  return w / (HEIGHT_M * HEIGHT_M);
}

function bmiCategory(b) {
  if (b < 18.5) return { label: 'Underweight', cls: 'tag-under' };
  if (b < 25) return { label: 'Normal', cls: 'tag-normal' };
  if (b < 30) return { label: 'Overweight', cls: 'tag-overweight' };
  return { label: 'Obese', cls: 'tag-obese' };
}

function rolling7(data, idx) {
  const date = data[idx].date;
  const cutoff = new Date(date); cutoff.setDate(cutoff.getDate() - 6);
  let sum = 0, count = 0;
  for (let i = idx; i >= 0; i--) {
    if (data[i].date < cutoff) break;
    sum += data[i].weight; count++;
  }
  return count > 0 ? sum/count : null;
}

function processSheetRows(rows, colDateIdx, colWeightIdx) {
  const parsed = [];
  for (const row of rows) {
    const dateStr = row[colDateIdx];
    const weightStr = row[colWeightIdx];
    if (!dateStr || !weightStr) continue;
    const d = parseDate(dateStr);
    const w = parseFloat(weightStr);
    if (!d || isNaN(w) || w < 20 || w > 300) continue;
    const iso = toISO(d);
    parsed.push({ date: d, iso, weight: w });
  }
  parsed.sort((a,b) => a.date - b.date);
  const deduped = [];
  const seen = new Set();
  for (const r of parsed) {
    if (!seen.has(r.iso)) { seen.add(r.iso); deduped.push(r); }
  }
  return deduped;
}

async function fetchFromSheet() {
  const sheetId = $('set-sheet-id').value.trim();
  const apiKey = $('set-api-key').value.trim();
  const sheetName = $('set-sheet-name').value.trim() || 'Sheet1';
  const colDate = ($('set-col-date').value.trim() || 'B').toUpperCase();
  const colWeight = ($('set-col-weight').value.trim() || 'C').toUpperCase();
  if (!sheetId || !apiKey) return false;
  const colToIdx = c => c.charCodeAt(0) - 65;
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${encodeURIComponent(sheetName + '!A:Z')}?key=${apiKey}`;
  $('settings-status').textContent = 'Loading…';
  $('settings-status').className = 'status';
  try {
    const res = await fetch(url);
    const json = await res.json();
    if (json.error) throw new Error(json.error.message);
    const rows = json.values || [];
    if (rows.length < 2) throw new Error('No data found in sheet.');
    const data = processSheetRows(rows.slice(1), colToIdx(colDate), colToIdx(colWeight));
    if (data.length === 0) throw new Error('No valid weight readings found. Check column settings.');
    allData = mergeData(allData, data);
    saveLocal();
    $('settings-status').textContent = `✓ Loaded ${data.length} readings`;
    $('settings-status').className = 'status ok';
    return true;
  } catch (e) {
    $('settings-status').textContent = `Error: ${e.message}`;
    $('settings-status').className = 'status error';
    return false;
  }
}

function mergeData(existing, incoming) {
  const map = new Map();
  for (const r of existing) map.set(r.iso, r);
  for (const r of incoming) map.set(r.iso, r);
  return [...map.values()].sort((a,b) => a.date - b.date);
}

function render() {
  if (allData.length === 0) {
    $('empty-state').style.display = '';
    $('dashboard').style.display = 'none';
    return;
  }
  $('empty-state').style.display = 'none';
  $('dashboard').style.display = '';
  const dash = $('dashboard');
  dash.innerHTML = buildDashboardHTML();
  drawCharts();
}

function buildDashboardHTML() {
  const data = allData;
  const last = data[data.length - 1];
  const todayISO = last.iso;
  const findExact = (days) => {
    const d = new Date(last.iso + 'T00:00:00');
    d.setDate(d.getDate() - days);
    const iso = toISO(d);
    return data.find(r => r.iso === iso) || null;
  };
  const todayData = data.find(r => r.iso === todayISO) || null;
  const lastWeekData = findExact(7);
  const lastYear = findExact(364);
  const yesterdayData = findExact(1);
  const today = todayData ? todayData.weight : null;
  const bmiVal = today ? bmi(today) : null;
  const cat = bmiVal ? bmiCategory(bmiVal) : null;

  // Rolling averages for comparison points
  const lastIdx = data.length - 1;
  const yesterdayIdx = yesterdayData ? data.indexOf(yesterdayData) : null;
  const lastWeekIdx = lastWeekData ? data.indexOf(lastWeekData) : null;
  const lastYearIdx = lastYear ? data.indexOf(lastYear) : null;

  const avg7 = rolling7(data, lastIdx);
  const yesterdayAvg7 = yesterdayIdx !== null ? rolling7(data, yesterdayIdx) : null;
  const lastWeekAvg7 = lastWeekIdx !== null ? rolling7(data, lastWeekIdx) : null;
  const lastYearAvg7 = lastYearIdx !== null ? rolling7(data, lastYearIdx) : null;

  const yesterday = yesterdayData ? yesterdayData.weight : null;
  const lastWeekWeight = lastWeekData ? lastWeekData.weight : null;
  const lastYearWeight = lastYear ? lastYear.weight : null;

  const targetBmi = target ? bmi(target) : null;
  const avg7bmi = avg7 ? bmi(avg7) : null;
  const yesterdayBmi7 = yesterdayAvg7 ? bmi(yesterdayAvg7) : null;
  const lastWeekBmi7 = lastWeekAvg7 ? bmi(lastWeekAvg7) : null;
  const lastYearBmi7 = lastYearAvg7 ? bmi(lastYearAvg7) : null;
  const yesterdayBmiDaily = yesterdayData ? bmi(yesterdayData.weight) : null;
  const lastWeekBmiDaily = lastWeekData ? bmi(lastWeekData.weight) : null;
  const lastYearBmiDaily = lastYear ? bmi(lastYear.weight) : null;

  const deltaClass = (cur, prev) => {
    if (cur == null || prev == null) return '';
    return cur > prev ? 'delta-pos' : 'delta-neg';
  };
  const deltaFmt = (cur, prev) => {
    if (cur == null || prev == null) return '—';
    const d = cur - prev;
    return `<span class="${deltaClass(cur, prev)}">${d > 0 ? '+' : ''}${d.toFixed(1)} kg</span>`;
  };
  const deltaFmtBmi = (cur, prev) => {
    if (cur == null || prev == null) return '—';
    const d = cur - prev;
    return `<span class="${deltaClass(cur, prev)}">${d > 0 ? '+' : ''}${d.toFixed(2)}</span>`;
  };

  const distFromTarget = target ? (today - target).toFixed(1) : '—';
  const distClass = target && today > target ? 'delta-pos' : 'delta-neg';

  return `
<div class="metrics-grid">

  <div class="metric-card">
    <div class="metric-label">7-day rolling average</div>
    <div class="metric-value">${avg7 ? avg7.toFixed(1) : '—'}<small style="font-size:14px;font-weight:400"> kg</small></div>
    <div class="metric-rows">
      <div class="metric-row"><span class="metric-row-label">vs target</span><span class="${deltaClass(avg7, target)}">${target ? deltaFmt(avg7, target) : '—'}</span></div>
      <div class="metric-row"><span class="metric-row-label">vs last week</span><span class="${deltaClass(avg7, lastWeekAvg7)}">${deltaFmt(avg7, lastWeekAvg7)}</span></div>
      <div class="metric-row"><span class="metric-row-label">vs yesterday</span><span class="${deltaClass(avg7, yesterdayAvg7)}">${deltaFmt(avg7, yesterdayAvg7)}</span></div>
      <div class="metric-row"><span class="metric-row-label">vs last year</span><span class="${deltaClass(avg7, lastYearAvg7)}">${deltaFmt(avg7, lastYearAvg7)}</span></div>
    </div>
  </div>

  <div class="metric-card">
    <div class="metric-label">Daily weight</div>
    <div class="metric-value">${today != null ? today.toFixed(1) : '—'}<small style="font-size:14px;font-weight:400"> kg</small></div>
    <div class="metric-rows">
      <div class="metric-row"><span class="metric-row-label">vs target</span><span class="${deltaClass(today, target)}">${target ? deltaFmt(today, target) : '—'}</span></div>

function getSlice(days) {
  const data = allData;
  if (days === 'all') return data;
  const lastISO = data[data.length - 1].iso;
  const cutoff = new Date(lastISO + 'T00:00:00');
  cutoff.setDate(cutoff.getDate() - days + 1);
  const cutoffISO = toISO(cutoff);
  return data.filter(d => d.iso >= cutoffISO);
}

function findClosestBefore(isoDate, daysBack) {
  const target = new Date(isoDate + 'T00:00:00');
  target.setDate(target.getDate() - daysBack);
  const targetISO = toISO(target);
  return allData.find(d => d.iso === targetISO) || null;
}

function buildDatasets7Daily() {
  const slice = getSlice(7);
  const labels = slice.map(d => d.iso.slice(5));
  const thisWeek = slice.map(d => parseFloat(d.weight.toFixed(2)));
  const lastWeek = slice.map(d => {
    const match = findClosestBefore(d.iso, 7);
    return match ? parseFloat(match.weight.toFixed(2)) : null;
  });
  const datasets = [
    ...bmiBandDatasets(labels.length),
    { label: 'This week', data: thisWeek, borderColor: '#3c34b8', backgroundColor: 'rgba(60,52,184,0.08)', borderWidth: 2, pointRadius: 4, fill: false, tension: 0.3 },
    { label: 'Same day last week', data: lastWeek, borderColor: '#afa9ec', backgroundColor: 'rgba(175,169,236,0.05)', borderWidth: 1.5, pointRadius: 3, fill: false, tension: 0.3, borderDash: [5,4] }
  ];
  if (target) datasets.push({ label: 'Target', data: Array(labels.length).fill(target), borderColor: '#ba7517', borderWidth: 1.5, pointRadius: 0, fill: false, borderDash: [6,4] });
  const allVals = [...thisWeek, ...lastWeek].filter(v => v != null);
  return { labels, datasets, min: Math.min(...allVals), max: Math.max(...allVals) };
}

function buildDayOfWeekDataBmi(vsYesterday) {
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const buckets = days.map(() => []);
  for (let i = 1; i < allData.length; i++) {
    const curr = allData[i];
    const prev = allData[i-1];
    const diffDays = Math.round((curr.date - prev.date) / 86400000);
    if (vsYesterday && diffDays !== 1) continue;
    const dow = curr.date.getDay();
    const currBmi = bmi(curr.weight);
    if (vsYesterday) {
      buckets[dow].push(currBmi - bmi(prev.weight));
    } else {
      const weekAgo = allData.find(d => Math.abs(d.date - new Date(curr.date.getTime() - 7*86400000)) < 86400000);
      if (weekAgo) buckets[dow].push(currBmi - bmi(weekAgo.weight));
    }
  }
  return days.map((d, i) => {
    if (buckets[i].length === 0) return 0;
    return parseFloat((buckets[i].reduce((a,b)=>a+b,0)/buckets[i].length).toFixed(3));
  });
}

function buildDayOfWeekDataDaily(vsYesterday) {
  const slice = getSlice(7);
  return slice.map(entry => {
    const day = entry.date.toLocaleDateString('en-GB', {weekday:'short'});
    let val = 0;
    if (vsYesterday) {
      const ydISO = (() => { const d = new Date(entry.iso + 'T00:00:00'); d.setDate(d.getDate()-1); return toISO(d); })();
      const prev = allData.find(d => d.iso === ydISO);
      if (prev) val = parseFloat((entry.weight - prev.weight).toFixed(2));
    } else {
      const lwISO = (() => { const d = new Date(entry.iso + 'T00:00:00'); d.setDate(d.getDate()-7); return toISO(d); })();
      const weekAgo = allData.find(d => d.iso === lwISO);
      if (weekAgo) val = parseFloat((entry.weight - weekAgo.weight).toFixed(2));
    }
    return { day, val };
  });
}

function buildDayOfWeekData(vsYesterday) {
  const slice = getSlice(7);
  return slice.map(entry => {
    const globalIdx = allData.indexOf(entry);
    const currAvg = rolling7(allData, globalIdx);
    if (!currAvg) return { day: entry.date.toLocaleDateString('en-GB', {weekday:'short'}), val: 0 };
    let val = 0;
    if (vsYesterday) {
      const ydISO = (() => { const d = new Date(entry.iso + 'T00:00:00'); d.setDate(d.getDate()-1); return toISO(d); })();
      const prev = allData.find(d => d.iso === ydISO);
      if (prev) {
        const prevAvg = rolling7(allData, allData.indexOf(prev));
        if (prevAvg) val = parseFloat((currAvg - prevAvg).toFixed(3));
      }
    } else {
      const lwISO = (() => { const d = new Date(entry.iso + 'T00:00:00'); d.setDate(d.getDate()-7); return toISO(d); })();
      const weekAgoEntry = allData.find(d => d.iso === lwISO);
      if (weekAgoEntry) {
        const weekAgoAvg = rolling7(allData, allData.indexOf(weekAgoEntry));
        if (weekAgoAvg) val = parseFloat((currAvg - weekAgoAvg).toFixed(3));
      }
    }
    return { day: entry.date.toLocaleDateString('en-GB', {weekday:'short'}), val };
  });
}

function bmiBandDatasets(n) {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  const o = dark ? 0.35 : 0.15;
  return [
    { label: '_red', data: Array(n).fill(120), borderColor: 'transparent', borderWidth: 0, pointRadius: 0, fill: { value: BMI_OVERWEIGHT }, backgroundColor: `rgba(226,75,74,${o})` },

    { label: '_green', data: Array(n).fill(BMI_NORMAL), borderColor: 'transparent', borderWidth: 0, pointRadius: 0, fill: { value: 50 }, backgroundColor: `rgba(99,153,34,${o})` }
  ];
}

function makeChartOptions(dataMin, dataMax, extraY = {}, pad = 2) {
  const yMin = parseFloat((dataMin - pad).toFixed(1));
  const yMax = parseFloat((dataMax + pad).toFixed(1));
  return {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: { filter: ctx => ctx.dataset.label && !ctx.dataset.label.startsWith('_'), callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y != null ? ctx.parsed.y.toFixed(1) + ' kg' : ''}` } } },
    scales: {
      x: { grid: { color: 'rgba(128,128,128,0.1)' }, ticks: { color: '#888', font: { size: 11 }, maxTicksLimit: 8 } },
      y: { grid: { color: 'rgba(128,128,128,0.1)' }, ticks: { color: '#888', font: { size: 11 }, callback: v => v.toFixed(1) }, min: yMin, max: yMax, ...extraY }
    }
  };
}

function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

function drawCharts() {
  Object.keys(charts).forEach(id => { if (charts[id]) charts[id].destroy(); });
  charts = {};

  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const barOpts = (data) => ({
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => (ctx.parsed.y >= 0 ? '+' : '') + ctx.parsed.y.toFixed(3) } } },
    scales: {
      x: { grid: { color: 'rgba(128,128,128,0.1)' }, ticks: { color: '#888', font: { size: 11 } } },
      y: { grid: { color: 'rgba(128,128,128,0.1)' }, ticks: { color: '#888', font: { size: 11 }, callback: v => (v > 0 ? '+' : '') + v.toFixed(2) } }
    }
  });
  const barColors = (data) => data.map(v => v >= 0 ? 'rgba(226,75,74,0.7)' : 'rgba(99,153,34,0.7)');

  // --- 7-DAY AVERAGE ---
  const { labels: l7a, datasets: d7a, min: min7a, max: max7a } = buildDatasets7Avg();
  charts.c7avg = new Chart($('chart7avg'), { type: 'line', data: { labels: l7a, datasets: d7a }, options: makeChartOptions(min7a, max7a, {}, 0.5) });

  const { labels: l28, datasets: d28, min: min28, max: max28 } = buildDatasets28();
  charts.c28 = new Chart($('chart28'), { type: 'line', data: { labels: l28, datasets: d28 }, options: makeChartOptions(min28, max28) });

  const avgDayWeekRaw = buildDayOfWeekData(false);
  const avgDayWeekLabels = avgDayWeekRaw.map(r => r.day);
  const avgDayWeekVals = avgDayWeekRaw.map(r => r.val);
  charts.cAvgDayWeek = new Chart($('chartAvgDayWeek'), { type: 'bar', data: { labels: avgDayWeekLabels, datasets: [{ data: avgDayWeekVals, backgroundColor: barColors(avgDayWeekVals), borderRadius: 4 }] }, options: barOpts(avgDayWeekVals) });

  const avgDayYestRaw = buildDayOfWeekData(true);
  const avgDayYestLabels = avgDayYestRaw.map(r => r.day);
  const avgDayYestVals = avgDayYestRaw.map(r => r.val);
  charts.cAvgDayYest = new Chart($('chartAvgDayYest'), { type: 'bar', data: { labels: avgDayYestLabels, datasets: [{ data: avgDayYestVals, backgroundColor: barColors(avgDayYestVals), borderRadius: 4 }] }, options: barOpts(avgDayYestVals) });

  const { labels: lAll, datasets: dAll, min: minAll, max: maxAll } = buildDatasetsAll();
  charts.cAll = new Chart($('chartAll'), { type: 'line', data: { labels: lAll, datasets: dAll }, options: makeChartOptions(minAll, maxAll) });

  // --- BMI ---
  const { labels: lBmi7, thisWeekBmi, lastWeekBmi, min: minBmi7, max: maxBmi7 } = buildDatasetsBmi7();
  const bmi7pad = 0.5;
  charts.cBmi7 = new Chart($('chartBmi7'), {
    type: 'line',
    data: { labels: lBmi7, datasets: [
      { label: 'This week', data: thisWeekBmi, borderColor: '#3c34b8', borderWidth: 2, pointRadius: 4, fill: false, tension: 0.3 },
      { label: 'Same week last week', data: lastWeekBmi, borderColor: '#afa9ec', borderWidth: 1.5, pointRadius: 3, fill: false, tension: 0.3, borderDash: [5,4] }
    ]},
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(2)}` } } }, scales: { x: { grid: { color: 'rgba(128,128,128,0.1)' }, ticks: { color: '#888', font: { size: 11 } } }, y: { grid: { color: 'rgba(128,128,128,0.1)' }, ticks: { color: '#888', font: { size: 11 }, callback: v => v.toFixed(1) }, min: minBmi7 - bmi7pad, max: maxBmi7 + bmi7pad } } }
  });

  const { labels: lBmi28, bmiVals: bmiVals28 } = buildDatasetsBmi28();
  const minBmi28 = 18, maxBmi28 = Math.max(32, ...bmiVals28.filter(Boolean)) + 1;
  charts.cBmi28 = new Chart($('chartBmi28'), {
    type: 'line',
    data: { labels: lBmi28, datasets: [
      { label: '7-day BMI', data: bmiVals28, borderColor: '#3c34b8', borderWidth: 2, pointRadius: 2, fill: false, tension: 0.3 },
      { label: '_obese', data: Array(lBmi28.length).fill(maxBmi28), borderColor: 'transparent', borderWidth: 0, pointRadius: 0, fill: { value: 30 }, backgroundColor: 'rgba(226,75,74,0.15)' },
      { label: '_overweight', data: Array(lBmi28.length).fill(30), borderColor: 'transparent', borderWidth: 0, pointRadius: 0, fill: { value: 25 }, backgroundColor: 'rgba(186,117,23,0.15)' },
      { label: '_normal', data: Array(lBmi28.length).fill(25), borderColor: 'transparent', borderWidth: 0, pointRadius: 0, fill: { value: minBmi28 }, backgroundColor: 'rgba(99,153,34,0.15)' }
    ]},
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { filter: ctx => !ctx.dataset.label.startsWith('_'), callbacks: { label: ctx => `BMI: ${ctx.parsed.y.toFixed(2)}` } } }, scales: { x: { grid: { color: 'rgba(128,128,128,0.1)' }, ticks: { color: '#888', font: { size: 11 }, maxTicksLimit: 8 } }, y: { grid: { color: 'rgba(128,128,128,0.1)' }, ticks: { color: '#888', font: { size: 11 }, callback: v => v.toFixed(1) }, min: minBmi28, max: maxBmi28 } } }
  });

  const bmiDayWeek = buildDayOfWeekDataBmi(false);
  charts.cBmiDayWeek = new Chart($('chartBmiDayWeek'), { type: 'bar', data: { labels: days, datasets: [{ data: bmiDayWeek, backgroundColor: barColors(bmiDayWeek), borderRadius: 4 }] }, options: barOpts(bmiDayWeek) });

  const bmiDayYest = buildDayOfWeekDataBmi(true);
  charts.cBmiDayYest = new Chart($('chartBmiDayYest'), { type: 'bar', data: { labels: days, datasets: [{ data: bmiDayYest, backgroundColor: barColors(bmiDayYest), borderRadius: 4 }] }, options: barOpts(bmiDayYest) });

  const { labels: lBmiAll, bmiVals: bmiValsAll } = buildDatasetsBmiAll();
  const minBmiAll = 18, maxBmiAll = Math.max(32, ...bmiValsAll.filter(Boolean)) + 1;
  charts.cBmiAll = new Chart($('chartBmiAll'), {
    type: 'line',
    data: { labels: lBmiAll, datasets: [
      { label: '7-day BMI', data: bmiValsAll, borderColor: '#3c34b8', borderWidth: 1.5, pointRadius: 0, fill: false, tension: 0.2 },
      { label: '_obese', data: Array(lBmiAll.length).fill(maxBmiAll), borderColor: 'transparent', borderWidth: 0, pointRadius: 0, fill: { value: 30 }, backgroundColor: 'rgba(226,75,74,0.15)' },
      { label: '_overweight', data: Array(lBmiAll.length).fill(30), borderColor: 'transparent', borderWidth: 0, pointRadius: 0, fill: { value: 25 }, backgroundColor: 'rgba(186,117,23,0.15)' },
      { label: '_normal', data: Array(lBmiAll.length).fill(25), borderColor: 'transparent', borderWidth: 0, pointRadius: 0, fill: { value: minBmiAll }, backgroundColor: 'rgba(99,153,34,0.15)' }
    ]},
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { filter: ctx => !ctx.dataset.label.startsWith('_'), callbacks: { label: ctx => `BMI: ${ctx.parsed.y.toFixed(2)}` } } }, scales: { x: { grid: { color: 'rgba(128,128,128,0.1)' }, ticks: { color: '#888', font: { size: 11 }, maxTicksLimit: 8 } }, y: { grid: { color: 'rgba(128,128,128,0.1)' }, ticks: { color: '#888', font: { size: 11 }, callback: v => v.toFixed(1) }, min: minBmiAll, max: maxBmiAll } } }
  });

  // --- DAILY WEIGHT ---
  const { labels: l7d, datasets: d7d, min: min7d, max: max7d } = buildDatasets7Daily();
  charts.c7daily = new Chart($('chart7daily'), { type: 'line', data: { labels: l7d, datasets: d7d }, options: makeChartOptions(min7d, max7d, {}, 0.5) });

  const { labels: lD28, datasets: dD28, min: minD28, max: maxD28 } = buildDatasetsDaily28();
  charts.cDaily28 = new Chart($('chartDaily28'), { type: 'line', data: { labels: lD28, datasets: dD28 }, options: makeChartOptions(minD28, maxD28) });

  const dayWeekRaw = buildDayOfWeekDataDaily(false);
  const dayWeekLabels = dayWeekRaw.map(r => r.day);
  const dayWeekVals = dayWeekRaw.map(r => r.val);
  charts.cDayWeek = new Chart($('chartDayWeek'), { type: 'bar', data: { labels: dayWeekLabels, datasets: [{ data: dayWeekVals, backgroundColor: barColors(dayWeekVals), borderRadius: 4 }] }, options: barOpts(dayWeekVals) });

  const dayYestRaw = buildDayOfWeekDataDaily(true);
  const dayYestLabels = dayYestRaw.map(r => r.day);
  const dayYestVals = dayYestRaw.map(r => r.val);
  charts.cDayYest = new Chart($('chartDayYest'), { type: 'bar', data: { labels: dayYestLabels, datasets: [{ data: dayYestVals, backgroundColor: barColors(dayYestVals), borderRadius: 4 }] }, options: barOpts(dayYestVals) });

  const { labels: lDA, datasets: dDA, min: minDA, max: maxDA } = buildDatasetsDailyAll();
  charts.cDailyAll = new Chart($('chartDailyAll'), { type: 'line', data: { labels: lDA, datasets: dDA }, options: makeChartOptions(minDA, maxDA) });

  buildDataTable();
}

function buildDataTable() {
  const recent = [...allData].reverse();
  let html = `<table><thead><tr><th>Date</th><th>Wt</th><th>7d avg</th><th>BMI</th></tr></thead><tbody>`;
  for (const row of recent) {
    const globalIdx = allData.indexOf(row);
    const avg = rolling7(allData, globalIdx);
    const b = bmi(row.weight);
    const cat = bmiCategory(b);
    const bmiCls = cat.cls === 'tag-normal' ? 'bmi-normal' : cat.cls === 'tag-overweight' ? 'bmi-overweight' : cat.cls === 'tag-obese' ? 'bmi-obese' : 'bmi-under';
    html += `<tr>
      <td>${row.iso}</td>
      <td>${row.weight.toFixed(1)}</td>
      <td>${avg ? avg.toFixed(1) : '—'}</td>
      <td><span class="bmi-cell ${bmiCls}">${b.toFixed(1)}</span></td>
    </tr>`;
  }
  html += '</tbody></table>';
  $('data-table-container').innerHTML = html;
}

function openModal(id) { $(id).classList.add('open'); }
function closeModal(id) { $(id).classList.remove('open'); }

$('btn-settings').onclick = () => openModal('modal-settings');
$('btn-settings-cancel').onclick = () => closeModal('modal-settings');
$('btn-setup-sheet').onclick = () => openModal('modal-settings');

$('btn-settings-load').onclick = async () => {
  const t = parseFloat($('set-target').value);
  target = isNaN(t) ? null : t;
  const ok = await fetchFromSheet();
  if (ok) { saveLocal(); closeModal('modal-settings'); render(); }
};

$('btn-add').onclick = () => {
  $('add-date').value = new Date().toISOString().slice(0,10);
  openModal('modal-add');
};
$('btn-add-first').onclick = () => {
  $('add-date').value = new Date().toISOString().slice(0,10);
  openModal('modal-add');
};
$('btn-add-cancel').onclick = () => closeModal('modal-add');

$('btn-add-save').onclick = () => {
  const dateStr = $('add-date').value;
  const w = parseFloat($('add-weight').value);
  if (!dateStr || isNaN(w)) { alert('Please enter a valid date and weight.'); return; }
  const d = new Date(dateStr);
  const iso = toISO(d);
  const existing = allData.findIndex(r => r.iso === iso);
  if (existing >= 0) allData[existing].weight = w;
  else { allData.push({ date: d, iso, weight: w }); allData.sort((a,b) => a.date - b.date); }
  saveLocal();
  closeModal('modal-add');
  render();
};

$('modal-settings').addEventListener('click', e => { if (e.target === $('modal-settings')) closeModal('modal-settings'); });
$('modal-add').addEventListener('click', e => { if (e.target === $('modal-add')) closeModal('modal-add'); });

function init() {
  loadSettings();
  const stored = localStorage.getItem('wt_data');
  if (stored) {
    const raw = JSON.parse(stored);
    allData = raw.map(r => ({ ...r, date: new Date(r.date) })).sort((a,b) => a.date - b.date);
  }
  render();
}

const savedTheme = localStorage.getItem('wt_theme');
if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
function updateThemeBtn() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  const moon = document.getElementById('icon-moon');
  const sun = document.getElementById('icon-sun');
  if (moon) moon.style.display = dark ? 'none' : '';
  if (sun) sun.style.display = dark ? '' : 'none';
}
updateThemeBtn();
$('btn-theme').onclick = () => {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = dark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('wt_theme', next);
  updateThemeBtn();
  render();
};

init();

// Auto-refresh every 15 minutes if sheet is configured
async function autoRefresh() {
  const s = JSON.parse(localStorage.getItem('wt_settings') || '{}');
  if (s.sheetId && s.apiKey) {
    await fetchFromSheet();
    render();
  }
}
setInterval(autoRefresh, 15 * 60 * 1000);

// Also refresh when tab becomes visible after being hidden
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') autoRefresh();
});
</script>
